name: Builder

on:
  push:
    branches:
      - master
    paths:
      - "snapcast/**"
  workflow_dispatch:

env:
  ARCHITECTURES: '["amd64", "aarch64", "armv7", "armhf", "i386"]'
  IMAGE_NAME: snapcast

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@v2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    needs: init
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.init.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.arch }}
        uses: home-assistant/builder/actions/build-image@v2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            latest
          push: "true"

  manifest:
    needs: [init, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@v2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            latest
